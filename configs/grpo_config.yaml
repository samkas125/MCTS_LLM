# GRPO training hyperparameters
model:
  name_or_path: "Qwen/Qwen2.5-Math-1.5B"
  dtype: "bfloat16"

# QLoRA configuration
qlora:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# GRPO-specific
grpo:
  num_generations: 8             # Group size G
  max_completion_length: 512
  max_prompt_length: 512
  temperature: 0.7
  top_p: 0.8
  loss_type: "dr_grpo"          # Length-bias corrected (also: "grpo", "dapo")
  beta: 0.0                     # No KL penalty
  epsilon: 0.2                  # Clip range
  scale_rewards: "group"
  num_iterations: 1

# vLLM colocate mode
vllm:
  use_vllm: true
  vllm_mode: "colocate"
  gpu_memory_utilization: 0.3
  enable_sleep_mode: true

# Training
training:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  learning_rate: 1.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  num_train_epochs: 1
  max_grad_norm: 0.1
  bf16: true

# Reward weights
rewards:
  accuracy_weight: 1.0
  format_weight: 0.1
  qvalue_weight: 0.5

# Logging
logging:
  report_to: "wandb"
  logging_steps: 5
  log_completions: true
  num_completions_to_print: 4

# Saving
saving:
  save_steps: 200
  save_total_limit: 3
  output_dir: "outputs/checkpoints"
