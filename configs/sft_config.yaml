# SFT baseline training hyperparameters
model:
  name_or_path: "Qwen/Qwen2.5-Math-1.5B"
  dtype: "bfloat16"

# Same QLoRA/LoRA config as GRPO for fair comparison
qlora:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 2
  gradient_checkpointing: true
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  num_train_epochs: 3
  bf16: true

logging:
  report_to: "wandb"
  logging_steps: 10

saving:
  save_steps: 500
  save_total_limit: 3
  output_dir: "outputs/checkpoints"
